<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="culturama-favico.png">
    <link rel="stylesheet" href="./assets/css/style.css">

    <title>Pesquisa Culturama</title>
</head>
<body>
    <header role="banner">
        <img src="./assets/img/logo-culturama.png" alt="logo culturama">
        <h1>Pesquisa de opnião</h1>
    </header>
    <section>
       <form action="sucesso.html" method="GET">
            <fieldset>
                <!--DADOS PESSOAIS-->
                <legend>Dados Pessoais</legend>
                <label for="name">Nome:</label>
                <input id="name" type="text" name="userName" required>
                <br>            
                <label for="age">Idade:</label>
                <input id="age" type="number" name="userAge" min="12" max="100" required>
                <br>
                <label for="birthDate">Data de nascimento:</label>
                <input id="birthDate" type="date" name="userBirthDate">
                <br>
                <label for="email">E-mail:</label>
                <input id="email" type="email" name="userEmail" required>
                <br>
                <label for="phoneNumber">Telefone:</label>
                <input id="phoneNumber" type="tel" name="userPhoneNumber" pattern="[0-9]{11}" 
                       placeholder="DDD + número sem espaço ou hífen" aria-describedby="phoneHelp">
                <small id="phoneHelp">Preecha com 11 dígitos no formato DDD + números sem espaços ou hífen.</small>
                <br>
                <label for="image">Upload de foto:</label>
                <input id="image" type="file" accept="image/*" name="userImage">
            </fieldset>
            <fieldset>
                <!-- DADOS PERFIL -->
                <legend>Perfil</legend>
                
                <p>Gênero:</p>
                <input id="fem" type="radio" name="userGender" value="feminino">
                <label for="fem">Feminino</label>

                <input id="masc" type="radio" name="userGender" value="masculino">
                <label for="masc">Masculino</label>

                <input id="notInformed" type="radio" name="userGender" value="naoInformado">
                <label for="notInformed">Prefiro não informar</label>
                <br>

                <label for="maritalStatus">Estado civil:</label>
                <select id="maritalStatus" name="userMaritalStatus">
                    <option value="notInformed">Selecione...</option>
                    <option value="casado">Casado</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="uniaoEstavel">União estável</option>
                </select>
                <br>

                <label for="state">Estado:</label>
                <select id="state" name="userState" required>
                    <option value="AC">Acre</option>
                    <option value="AL">Alagoas</option>
                    <option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option>
                    <option value="BA">Bahia</option>
                    <option value="CE">Ceará</option>
                    <option value="DF">Distrito Federal</option>
                    <option value="ES">Espírito Santo</option>
                    <option value="GO">Goiás</option>
                    <option value="MA">Maranhão</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="MS">Mato Grosso do Sul</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="PA">Pará</option>
                    <option value="PB">Paraíba</option>
                    <option value="PR">Paraná</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PI">Piauí</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="RO">Rondônia</option>
                    <option value="RR">Roraima</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="SP">São Paulo</option>
                    <option value="SE">Sergipe</option>
                    <option value="TO">Tocantins</option>
                </select>
                <br>

                <label for="city">Cidade</label>
                <input id="city" type="text" name="userCity">
            </fieldset>
            <fieldset>
                <legend>Hábitos</legend>
                <p>Redes Sociais:</p>
                <input id="instagram" type="checkbox" name="social" value="instagram">
                <label for="instagram">Instagram</label>
                <br>
                <input id="facebook" type="checkbox" name="social" value="facebook">
                <label for="facebook">Facebook</label>
                <br>
                <input id="linkedin" type="checkbox" name="social" value="linkedin">
                <label for="linkedin">Linkedin</label>
                <br>
                <input id="x" type="checkbox" name="social" value="x">
                <label for="x">X</label>
                <br>

                <label for="musicStyle">Estilo musical:</label>
                <input id="musicStyle" type="text" name="userMusicStyle" list="styleTypes">
                <datalist id="styleTypes">
                    <option value="Rock"></option>
                    <option value="Samba"></option>
                    <option value="Sertanejo"></option>
                </datalist>
                <br>

                <label for="favoriteColor">Cor favrita:</label>
                <input id="favoriteColor" type="color" name="userFavoriteColor">
            </fieldset>

            <fieldset>
                <legend>Opinião</legend>
                <p>Satisfação</p>
                <input id="excellent" type="radio" name="userSatisfation" value="otima">
                <label for="excellent">Ótima</label>
                <br>
                <input id="regular" type="radio" name="userSatisfation" value="regular">
                <label for="regular">Regular</label>
                <br>
                <input id="poor" type="radio" name="userSatisfation" value="ruim">
                <label for="poor">Ruim</label>
                <br>

                <label for="comment">Escreva sua opnião:</label>
                <br>
                <textarea id="comment" name="userComment" placeholder="Digite aqui..."></textarea>
            </fieldset>

            <fieldset>
                <legend>Confirmações</legend>
                <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="accepted" required>
                <label for="userLgpdTerm">Eu aceito participar da pesquisa</label>
                <br>

                <input type="checkbox" name="userGetResult" id="getResult" value="accepted">
                <label for="userLgpdTerm">Desejo receber o resultado por e-mail</label>
                <br>
            </fieldset>

            <button id="send" type="submit">Enviar</button>
            <button id="clean" type="reset">Limpar</button>
       </form> 
    </section>
</body>
</html>
